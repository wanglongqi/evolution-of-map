<!-- 支持LaTeX数学公式 -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    tags: 'ams'
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
  },
  svg: {
    fontCache: 'global'
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- 支持Mermaid图表 -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: true,
  theme: 'default',
  securityLevel: 'loose'
});
</script>

<!-- 添加自定义样式 -->
<style>
  /* 代码块样式 */
  .highlight {
    background-color: #f6f8fa;
    border: 1px solid #e9ecef;
    border-radius: 4px;
    padding: 16px;
    margin: 1em 0;
  }

  /* Mermaid图表样式 */
  .mermaid svg {
    max-width: 100%;
    height: auto;
  }

  /* 数学公式样式 */
  .MathJax_Display {
    font-size: 1.1em !important;
    margin: 1em 0;
  }
</style>
